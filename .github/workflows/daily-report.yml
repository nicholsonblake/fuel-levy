name: Daily Fuel Levy Report

on:
  schedule:
    # AEST = UTC+10, AEDT (Oct-Apr) = UTC+11
    # Hourly during Aus business hours: 8am-6pm AEST = 22:00-08:00 UTC
    # Runs Mon-Fri (Sun-Thu night UTC + Mon-Fri morning UTC)
    - cron: '0 22-23 * * 0-4'  # 8am-9am AEST (Sun-Thu UTC)
    - cron: '0 0-8 * * 1-5'    # 10am-6pm AEST (Mon-Fri UTC)
  push:
    branches: [master]
    paths-ignore: ['history/**', 'data/**', 'forecast/**']
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Fuel Levy Report (core — must succeed) ---
      - name: Backfill history
        run: python fuel_levy.py backfill

      - name: Generate HTML report
        run: python fuel_levy.py report --no-open

      # --- TGP Forecast Model (market-data dependent — allowed to fail) ---
      # These steps depend on external APIs (AIP, yfinance). If they fail
      # due to rate limiting, downtime, or weekend data gaps, the pipeline
      # continues and deploys the existing forecast report from the last
      # successful run.
      - name: Update TGP history from AIP
        id: tgp_update
        continue-on-error: true
        run: python update_tgp_history.py

      - name: Run TGP forecast model
        id: forecast
        continue-on-error: true
        run: python tgp_forecast.py

      - name: Generate forecast dashboard
        continue-on-error: true
        run: python forecast_report.py

      - name: Report forecast status
        if: steps.forecast.outcome == 'failure'
        run: echo "::warning::Forecast model failed (likely API issue). Deploying with last successful forecast."

      # --- Commit and deploy ---
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ reports/ data/ forecast/
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
