name: Daily Fuel Levy Report

on:
  schedule:
    # 12:00 midday AEDT = 01:00 UTC (AEDT is UTC+11)
    - cron: '0 1 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Backfill history
        run: python fuel_levy.py backfill

      - name: Generate HTML report
        run: python fuel_levy.py report --no-open

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ reports/
          git diff --cached --quiet || git commit -m "chore: update fuel levy report $(date -u +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
