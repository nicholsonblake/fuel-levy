name: Daily Fuel Levy Report

on:
  schedule:
    # 11:00am AEST = 01:00 UTC (AEST is UTC+10)
    # During AEDT (Oct-Apr) this fires at 12:00pm local
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Fuel Levy Report (existing) ---
      - name: Backfill history
        run: python fuel_levy.py backfill

      - name: Generate HTML report
        run: python fuel_levy.py report --no-open

      # --- TGP Forecast Model (new) ---
      - name: Update TGP history from AIP
        run: python update_tgp_history.py

      - name: Run TGP forecast model
        run: python tgp_forecast.py

      - name: Generate forecast dashboard
        run: python forecast_report.py

      # --- Commit and deploy ---
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ reports/ data/ forecast/
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
